apiVersion: v1
kind: Namespace
metadata:
  name: asiayo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-pvc
  namespace: asiayo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: asiayo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pretest-app
  template:
    metadata:
      labels:
        app: pretest-app
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - pretest-app
              topologyKey: "kubernetes.io/hostname"
      containers:
      - name: pretest-app
        image: nginx:1.30.0
        ports:
        - containerPort: 80
        volumeMounts:
        - name: app-storage
          mountPath: /var/lib/app-data
      volumes:
      - name: app-storage
        persistentVolumeClaim:
          claimName: app-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: app-svc
  namespace: asiayo
spec:
  selector:
    app: pretest-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: aisayo
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: asiayo.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: app-svc
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pretest-mysql
  namespace: asiayo
  labels:
    app: pretest-mysql
spec:
  ports:
  - name: mysql
    port: 3306
  clusterIP: None
  selector:
    app: pretest-mysql
---
apiVersion: v1
kind: Service
metadata:
  name: pretest-mysql-write
  namespace: asiayo
spec:
  ports:
  - port: 3306
    targetPort: 3306
  selector:
    statefulset.kubernetes.io/pod-name: pretest-mysql-0
---
apiVersion: v1
kind: Service
metadata:
  name: pretest-mysql-read
  namespace: asiayo
spec:
  ports:
  - port: 3306
    targetPort: 3306
  selector:
    app: pretest-mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pretest-mysql
  namespace: asiayo
spec:
  selector:
    matchLabels:
      app: pretest-mysql
  serviceName: pretest-mysql
  replicas: 3
  template:
    metadata:
      labels:
        app: pretest-mysql
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - pretest-mysql
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: pretest-mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: password
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: pretest-mysql-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: pretest-mysql-secret
  namespace: asiayo
type: Opaque
data:
  password: cGFzc3dvcmQK
